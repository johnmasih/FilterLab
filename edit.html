<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilterLab</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logofilterlab.png">
</head>

<body>
    <main>
        <section>
            <div class="left">
                <div class="top">
                    <label for="image-input" class="btn">
                        Choose Image
                        <input type="file" id="image-input" accept="image/*" hidden>
                    </label>
                    <button class="btn" id="reset-btn">Reset</button>
                    <button class="btn" id="download-btn">Download</button>
                </div>
                <div class="bottom">
                    <div class="placeholder">
                        <i class="ri-image-2-fill"></i>
                        <p>No Image Choosen</p>
                    </div>
                    <canvas id="image-canvas"></canvas>
                </div>
            </div>
            <div class="right">
                <h2>Filters</h2>
                <div class="filters">
                    <!-- <div class="filter">
                        <p>Brightness</p>
                        <input type="range" name="brightness" id="brightness" min="0" max="200" value="100">
                    </div> -->
                </div>
                <h2>Presets</h2>
                <div class="presets">
                    
                </div>
            </div>
        </section>
    </main>



    <script src="script.js"></script>
</body>

</html>
